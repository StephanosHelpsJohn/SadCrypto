<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sad Crypto — Fighter Edition</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="shell">
    <header>
      <h1>SAD CRYPTO</h1>
      <p class="tagline">Fighter Edition — Boss battles at every AI HQ</p>
    </header>
    <div id="game-wrap">
      <canvas id="game" width="640" height="360"></canvas>
    </div>
    <div id="controls">
      <div class="control-group">
        <span class="key">← →</span> Move
        <span class="key">↑</span> Jump
        <span class="key">Z</span> Punch
        <span class="key">X</span> Kick
        <span class="key">C</span> Bitcoin Special
        <span class="key">Hold away</span> Block
        <span class="key">ENTER</span> Start
      </div>
      <p class="hint">Click the game once to enable sound · Best of 3 rounds per CEO</p>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
